<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <script>
      // GitHub Pages has no server-side routing, so a direct link like
      // /plans/jeevan-umang would 404. This encodes the path into a query
      // string and redirects to the real app, which decodes it back on load
      // (see the matching script in index.html).
      //
      // pathSegmentsToKeep = 1 keeps "/RepoName" when serving from
      // username.github.io/RepoName/. If you switch to a custom domain
      // mapped at the root, change this to 0.
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
