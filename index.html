<!doctype html>
<html lang="en">

    <meta charset="UTF-8" />

    <meta name="description" content="Compare LIC of India plan categories — term, endowment, pension, ULIP and more — in English or Hindi, with Bindu, a guided plan assistant." />
    <title>SurakshaPath — LIC Plans, Explained Simply</title>
    <script>
      // Decodes the redirect from 404.html back into a real client-side route.
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
